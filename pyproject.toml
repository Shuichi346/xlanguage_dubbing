[project]
name = "ja-dubbing"
version = "4.0.0"
description = "英語動画を話者音声クローン付き日本語吹き替え動画に変換"
requires-python = ">=3.13"
dependencies = [
    "pip",
    "python-dotenv>=1.0.0",
    "spacy>=3.7.0",
    "pydub>=0.25.0",
    "audioop-lts>=0.2.1",
    "torch>=2.0.0",
    "torchaudio>=2.0.0",
    "pyannote-audio>=3.1.0",
    "plamo-translate>=1.0.0",
    "sentencepiece>=0.2.1",
    "mlx-audio[stt]>=0.3.0",
]


[project.scripts]
ja-dubbing = "ja_dubbing.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ja_dubbing"]

[tool.uv]
override-dependencies = ["transformers"]

[tool.ruff]
line-length = 99
target-version = "py313"
src = ["src"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["ja_dubbing"]
